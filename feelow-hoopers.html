<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feelow Hoopers | 5PM</title>
    <meta name="description" content="Ranking de Feelow Hoopers." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="smoke.css" />
</head>
<body class="character-page leo-world">
    <header class="world-header">
        <a class="brand-mark" href="index.html">5PM</a>
    </header>

    <main class="feelow-container">
        <section class="feelow-hero">
            <div class="feelow-hero-copy">
                <h1 class="leo-title" data-text="FEELOW HOOPERS">FEELOW HOOPERS</h1>
                <a class="feelow-back-link" href="leo.html"><span class="arrow">←</span> Volver a Leo</a>
            </div>
        </section>

        <section class="feelow-layout-grid">
            
            <div class="feelow-sidebar">
                <article class="feelow-panel auth-panel">
                    <div class="panel-header-minimal">ACCESO</div>
                    
                    <form id="login-form" class="feelow-form">
                        <input type="text" id="login-username" placeholder="Usuario" required />
                        <input type="password" id="login-password" placeholder="Contraseña (solo admin)" />
                        <button type="submit" class="brutalist-btn">ENTRAR</button>
                    </form>

                    <hr class="divider">

                    <form id="register-form" class="feelow-form">
                        <span class="form-subtitle">Nuevo Hooper</span>
                        <input type="text" id="register-username" placeholder="Nombre de usuario" required />
                        <input type="text" id="register-city" placeholder="Ciudad (opcional)" />
                        
                        <label for="register-photo" class="custom-file-upload">Subir foto de perfil</label>
                        <input type="file" id="register-photo" accept="image/*" />
                        
                        <button type="submit" class="brutalist-btn outline">REGISTRARSE</button>
                    </form>
                </article>

                <article class="feelow-panel profile-panel hidden" id="user-profile">
                    <div class="panel-header-minimal">TU PERFIL</div>
                    <div id="profile-view" class="profile-view"></div>
                    <button type="button" class="brutalist-btn outline" style="margin-top: 1rem;" onclick="clearCurrentUser(); location.reload();">Cerrar Sesión</button>
                </article>
            </div>

            <div class="feelow-main-content">
                <section class="feelow-panel ranking-panel">
                    <div class="panel-header-minimal">GLOBAL RANKING</div>
                    <div class="ranking-table-wrap">
                        <table class="brutalist-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>HOOPER</th>
                                    <th>USUARIO</th>
                                    <th>W</th>
                                    <th>L</th>
                                    <th>PTS</th>
                                </tr>
                            </thead>
                            <tbody id="ranking-body"></tbody>
                        </table>
                    </div>
                </section>

                <section id="admin-panel" class="feelow-panel admin-panel hidden">
                    <div class="panel-header-minimal admin-header">ADMINISTRACIÓN LEO FEELOW</div>
                    <div class="admin-grid">
                        
                        <form id="admin-stats-form" class="feelow-form admin-box">
                            <h3>Gestión de Stats</h3>
                            <select id="admin-user-select" class="admin-input"></select>
                            <div class="stats-inputs">
                                <input type="number" id="admin-wins" placeholder="W" min="0" value="0" />
                                <input type="number" id="admin-losses" placeholder="L" min="0" value="0" />
                            </div>
                            <button type="submit" class="brutalist-btn admin-btn">ACTUALIZAR</button>
                        </form>

                        <div class="feelow-form admin-box admin-actions">
                            <h3>Registrar Resultado</h3>
                            <select id="admin-result-user" class="admin-input"></select>
                            <div class="match-buttons">
                                <button id="admin-win-btn" type="button" class="match-btn win">WIN</button>
                                <button id="admin-loss-btn" type="button" class="match-btn loss">LOSS</button>
                            </div>
                        </div>

                        <form id="admin-create-form" class="feelow-form admin-box">
                            <h3>Añadir Usuario</h3>
                            <input type="text" id="admin-create-username" placeholder="Usuario" required />
                            <input type="text" id="admin-create-city" placeholder="Ciudad" />
                            <label for="admin-create-photo" class="custom-file-upload">Foto (Opcional)</label>
                            <input type="file" id="admin-create-photo" accept="image/*" />
                            <button type="submit" class="brutalist-btn outline">CREAR</button>
                        </form>

                        <form id="admin-badges-form" class="feelow-form admin-box">
                            <h3>Otorgar Insignias</h3>
                            <select id="admin-badge-user"></select>
                            <select id="admin-badge-select">
                                <option>Primer Hooper</option>
                                <option>Campeón del torneo</option>
                                <option>Participante fundador</option>
                                <option>Derrotó a Leo</option>
                                <option>Top 10 histórico</option>
                            </select>
                            <button type="submit" class="brutalist-btn outline">AÑADIR</button>
                        </form>

                    </div>
                </section>
            </div>
        </section>
    </main>

    <script src="scripts/feelow-hoopers.js"></script>
</body>
</html>
