<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bodhi Folk | Universo 5PM</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="smoke.css" />

    <style>
      body {
        background-color: #050505;
        overflow-x: hidden;
      }

      /* Contenedor que GSAP va a pinear */
      .world-hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background-color: #050505;
      }

      /* Canvas fijo para que nunca deje huecos negros */
      #hero-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        filter: brightness(0.55) contrast(1.15);
      }

      .hero-video-screen { position: absolute; inset: 0; z-index: 2; pointer-events: none; background: rgba(180, 12, 8, 0.15); mix-blend-mode: screen; }
      .hero-readability { position: absolute; inset: 0; z-index: 3; pointer-events: none; background: radial-gradient(ellipse 90% 70% at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.5) 100%), linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 45%); }
      .smoke-wrap { position: relative; z-index: 4; }

      /* El contenedor de todos los textos */
      .text-layer {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      /* Título principal */
      .world-title {
        text-align: center;
        will-change: transform, opacity;
      }

      .world-title .eyebrow { font-family: var(--font-label); font-size: clamp(0.7rem, 1.5vw, 0.9rem); font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #c28a35; margin-bottom: 1rem; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); }
      .world-title h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.1; font-weight: 700; margin-bottom: 1.5rem; background: linear-gradient(135deg, #f4eee3 0%, #c28a35 100%); -webkit-background-clip: text; color: transparent; }
      .world-title .world-tagline { font-family: var(--font-body); font-size: clamp(1rem, 1.2vw, 1.15rem); color: rgba(244, 238, 227, 0.85); max-width: 600px; margin: 0 auto; }

      /* Texto ceremonial (oculto abajo) */
      .ceremony-text {
        position: absolute;
        bottom: 15%; /* Más abajo para evitar choques iniciales */
        text-align: center;
        opacity: 0;
        will-change: transform, opacity;
      }
      .ceremony-text p { font-family: 'Georgia', serif; font-size: clamp(1.3rem, 3.2vw, 2.6rem); font-style: italic; color: #f4eee3; letter-spacing: 0.15em; text-shadow: 0 0 30px rgba(199, 15, 24, 0.8); }

      /* El resto de la web */
      .world-quote, .world-archive, .world-nav { position: relative; z-index: 20; background-color: #050505; }
    </style>
  </head>

  <body class="character-page bodhi-world">
    <header class="world-header">
      <a class="brand-mark" href="index.html">5PM</a>
    </header>

    <main>
      <section class="world-hero" id="hero-scene">
        
        <canvas id="hero-canvas" aria-hidden="true"></canvas>
        <div class="hero-video-screen" aria-hidden="true"></div>
        <div class="hero-readability" aria-hidden="true"></div>

        <div class="smoke-wrap" aria-hidden="true">
          <div class="smoke-blob"></div><div class="smoke-blob"></div>
        </div>

        <div class="text-layer">
          <div class="world-title" id="main-title">
            <p class="eyebrow">05 — Etnomusicólogo / Guionista / Don Juan</p>
            <h1>Bodhi Folk</h1>
            <p class="world-tagline">Mercenario cultural. Destruye aquello que también le pertenece, sin perder la cadencia.</p>
          </div>
          
          <div class="ceremony-text" id="scroll-text">
            <p>La ceremonia del deseo</p>
          </div>
        </div>

      </section>

      <section class="world-quote"><blockquote>"Entro como una llama..."</blockquote></section>
      </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script>
    (function () {
      gsap.registerPlugin(ScrollTrigger);

      const heroScene = document.getElementById('hero-scene');
      const canvas    = document.getElementById('hero-canvas');
      const ctx       = canvas.getContext('2d', { alpha: false });
      
      const frameCount = 26;
      const images = [];
      let imagesLoaded = 0;
      let allImagesReady = false;

      // Mostrar indicador de carga
      const loadingIndicator = document.createElement('div');
      loadingIndicator.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;color:#f4eee3;font-family:var(--font-label);font-size:clamp(1rem,2vw,1.5rem);letter-spacing:0.2em;text-transform:uppercase;';
      loadingIndicator.textContent = 'Cargando experiencia... 0%';
      document.body.appendChild(loadingIndicator);

      // 1. PRE-CARGA TOTAL DE LAS 26 IMÁGENES
      function preloadImages() {
        return new Promise((resolve) => {
          for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = `./images/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            img.onload = () => {
              imagesLoaded++;
              const percent = Math.round((imagesLoaded / frameCount) * 100);
              loadingIndicator.textContent = `Cargando experiencia... ${percent}%`;
              
              if (imagesLoaded === frameCount) {
                allImagesReady = true;
                loadingIndicator.textContent = 'Experiencia lista';
                setTimeout(() => loadingIndicator.remove(), 500);
                resolve();
              }
            };
            img.onerror = () => {
              console.error(`Error cargando frame ${i}`);
              imagesLoaded++;
              if (imagesLoaded === frameCount) {
                allImagesReady = true;
                loadingIndicator.remove();
                resolve();
              }
            };
            images.push(img);
          }
        });
      }

      // Función de dibujo con object-fit: cover
      function drawFrame(imgIndex) {
        if (!images[imgIndex] || !images[imgIndex].complete) return;
        
        const img = images[imgIndex];
        const cw = canvas.width;
        const ch = canvas.height;
        const iw = img.width;
        const ih = img.height;

        // Calcular scale para object-fit: cover (mantener ratio, cubrir todo el canvas)
        const scale = Math.max(cw / iw, ch / ih) * 1.05;
        const dw = iw * scale;
        const dh = ih * scale;
        const dx = (cw - dw) / 2;
        const dy = (ch - dh) / 2;

        ctx.clearRect(0, 0, cw, ch);
        ctx.drawImage(img, dx, dy, dw, dh);
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (allImagesReady && images.length > 0) {
          drawFrame(0); // Dibujar primer frame
        }
      }

      window.addEventListener('resize', resize);

      // Iniciar pre-carga y luego ScrollTrigger
      preloadImages().then(() => {
        resize();
        initScroll();
      });

      function initScroll() {
        // Estado del scrub
        const scrubState = { frame: 0 };

        // Animación de los textos
        const tlText = gsap.timeline({
          scrollTrigger: {
            trigger: heroScene,
            start: "top top",
            end: "+=200%",
            scrub: true
          }
        });

        tlText.to("#main-title", { y: -100, opacity: 0.3, duration: 1 }, 0);
        tlText.to("#scroll-text", { y: -100, opacity: 1, duration: 1 }, 0.5);

        // ScrollTrigger principal para el scrubbing de frames
        ScrollTrigger.create({
          trigger: heroScene,
          start: 'top top',
          end: '+=200%',
          pin: true,
          scrub: 0.5,
          onUpdate: (self) => {
            // Mapear progreso (0-1) al índice de frame (0-25)
            const targetFrame = Math.round(self.progress * (frameCount - 1));
            
            // Solo redibujar si el frame cambió (optimización)
            if (targetFrame !== scrubState.frame) {
              scrubState.frame = targetFrame;
              drawFrame(scrubState.frame);
            }
          }
        });
      }
    })();
    </script>
  </body>
</html>
